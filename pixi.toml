[workspace]
name = "etymology-data-science"
channels = ["conda-forge"]
platforms = ["osx-arm64", "win-64"]

[dependencies]
python = "3.12.*"
pandas = ">=2.0"
numpy = ">=1.26"
matplotlib = ">=3.8"
scipy = ">=1.12"
scikit-learn = ">=1.4"
networkx = ">=3.2"
jupyter = ">=1.0"
ipykernel = ">=6.29"
plotly = ">=5.20"
gensim = ">=4.3"
nltk = ">=3.8"
tqdm = ">=4.66"
requests = ">=2.31"

[pypi-dependencies]
lingpy = ">=2.6"
transformers = ">=4.38"
torch = ">=2.2"

[tasks]
render     = "quarto render"
render-pdf = "quarto render --to pdf"
preview    = "quarto preview"
