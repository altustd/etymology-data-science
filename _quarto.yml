project:
  type: book
  output-dir: docs

book:
  title: "Etymology + Data Science"
  subtitle: "A Computational Survey of Word Origins"
  author: "Troy Altus"
  date: "May 2026"
  repo-url: https://github.com/altustd/etymology-data-science
  chapters:
    - preface.qmd
    - index.qmd
    - part: "Part I: Foundations"
      chapters:
        - 02-comparative-method.qmd
        - 03-representing-language.qmd
    - part: "Part II: Core Algorithms"
      chapters:
        - 04-sequence-alignment.qmd
        - 05-cognate-detection.qmd
        - 06-phylogenetic-inference.qmd
    - part: "Part III: Advanced Techniques"
      chapters:
        - 07-proto-reconstruction.qmd
        - 08-semantic-drift.qmd
        - 09-borrowing-detection.qmd
        - 10-llms-etymology.qmd
        - 11-etymology-graphs.qmd
        - 12-borrowing-networks.qmd
    - part: "Part IV: Synthesis"
      chapters:
        - 13-capstone.qmd
    - references.qmd
  appendices:
    - appendix-a-glossary.qmd
    - appendix-b-tools.qmd

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: true
    fig-align: center
    mermaid:
      theme: neutral
  pdf:
    documentclass: book
    classoption: [letterpaper, 11pt]
    geometry:
      - top=1in
      - bottom=1in
      - left=1.25in
      - right=1in
    number-sections: true
    colorlinks: true
    toc: true
    toc-depth: 3
    pdf-engine: latexmk
    pdf-engine-opts:
      - "-lualatex"

bibliography: references.bib

execute:
  echo: false
  warning: false
  message: false
